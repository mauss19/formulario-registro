<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Avanzado de Registro</title>
    <link rel="stylesheet" href="../css/formulario.css">
    
   
</head>
<body>

<form novalidate>
  <label for="nombre">Nombre</label>
  <input type="text" id="nombre">
  <span class="error-msg" id="error-nombre"></span>

  <label for="correo">Correo</label>
  <input type="email" id="correo">
  <span class="error-msg" id="error-correo"></span>

  <label for="password">Contraseña</label>
  <input type="password" id="password">
  <span class="error-msg" id="error-password"></span>

  <label for="confirmar-password">Confirmar Contraseña</label>
  <input type="password" id="confirmar-password">
  <span class="error-msg" id="error-confirmar-password"></span>

  <button type="submit">Crear cuenta</button>
</form>


    <script src="../js/formulario.js"></script>
</body>
</html>
